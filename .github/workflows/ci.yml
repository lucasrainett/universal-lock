name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build

  changeset-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for changesets
        id: changeset-check
        run: |
          # Check if any package source files changed
          CHANGED=$(git diff --name-only origin/master...HEAD -- 'packages/*/src/**')
          if [ -n "$CHANGED" ]; then
            if ! pnpm changeset status --since=origin/master 2>&1; then
              echo "missing=true" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          else
            echo "No package source changes detected, skipping changeset check."
          fi

      - name: Comment instructions on missing changeset
        if: failure() && steps.changeset-check.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `### Missing changeset

            This PR changes package source files but does not include a changeset. Please add one so the affected packages can be versioned and released.

            **How to fix:**

            1. Run the following command locally:
               \`\`\`bash
               pnpm changeset
               \`\`\`
            2. Select the packages affected by your changes
            3. Choose the appropriate version bump:
               - **patch** — bug fixes, internal changes
               - **minor** — new features, non-breaking changes
               - **major** — breaking changes
            4. Write a short summary of your changes
            5. Commit the generated file in \`.changeset/\` and push

            If your changes don't affect published packages (e.g., docs only, CI config), you can add an empty changeset:
            \`\`\`bash
            pnpm changeset --empty
            \`\`\``;

            // Check for existing comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('### Missing changeset'));
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
