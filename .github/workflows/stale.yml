name: Stale

on:
  schedule:
    - cron: "0 0 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been inactive for 60 days and will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This PR has been inactive for 60 days and will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment.
          exempt-issue-labels: pinned,security
          exempt-pr-labels: pinned
